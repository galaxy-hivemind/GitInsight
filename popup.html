<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>GitInsight Settings</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 360px;
            min-height: 280px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            padding: 20px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .header svg {
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .section {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 12px;
            color: #8b949e;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 10px 12px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #e6edf3;
            font-size: 13px;
            font-family: 'SFMono-Regular', Consolas, monospace;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        .hint {
            font-size: 11px;
            color: #484f58;
            margin-top: 6px;
            line-height: 1.5;
        }

        .hint a {
            color: #6366f1;
            text-decoration: none;
        }

        .hint a:hover {
            text-decoration: underline;
        }

        .btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn-danger {
            background: transparent;
            color: #f85149;
            border: 1px solid rgba(248, 81, 73, 0.3);
            margin-top: 8px;
        }

        .btn-danger:hover {
            background: rgba(248, 81, 73, 0.1);
        }

        .status {
            margin-top: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            display: none;
        }

        .status.success {
            display: block;
            background: rgba(63, 185, 80, 0.1);
            border: 1px solid rgba(63, 185, 80, 0.3);
            color: #3fb950;
        }

        .status.error {
            display: block;
            background: rgba(248, 81, 73, 0.1);
            border: 1px solid rgba(248, 81, 73, 0.3);
            color: #f85149;
        }

        .rate-info {
            padding: 12px;
            background: #161b22;
            border: 1px solid #21262d;
            border-radius: 8px;
            margin-top: 16px;
        }

        .rate-info h3 {
            font-size: 12px;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .rate-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            padding: 4px 0;
        }

        .rate-row span:first-child {
            color: #8b949e;
        }

        .rate-row span:last-child {
            font-weight: 600;
        }

        .rate-row .good {
            color: #3fb950;
        }

        .rate-row .warn {
            color: #f59e0b;
        }

        .rate-row .bad {
            color: #f85149;
        }
    </style>
</head>

<body>
    <div class="header">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="url(#g)" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <defs>
                <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#6366f1" />
                    <stop offset="100%" stop-color="#a855f7" />
                </linearGradient>
            </defs>
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
        </svg>
        <h1>GitInsight</h1>
    </div>

    <div class="section">
        <label for="token-input">GitHub Personal Access Token</label>
        <input type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" spellcheck="false" />
        <p class="hint">
            Generate a token at <a href="https://github.com/settings/tokens"
                target="_blank">github.com/settings/tokens</a><br />
            No scopes needed for public repos. Add <code>repo</code> scope for private repos.
        </p>
    </div>

    <button id="save-btn" class="btn btn-primary">Save Token</button>
    <button id="clear-btn" class="btn btn-danger">Clear Token</button>

    <div id="status" class="status"></div>

    <div class="rate-info">
        <h3>API Rate Limits</h3>
        <div class="rate-row">
            <span>Without token:</span>
            <span class="bad">60 req/hr</span>
        </div>
        <div class="rate-row">
            <span>With token:</span>
            <span class="good">5,000 req/hr</span>
        </div>
        <div class="rate-row">
            <span>Current status:</span>
            <span id="rate-status">checking...</span>
        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
